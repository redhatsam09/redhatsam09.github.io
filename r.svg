<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }

        .container {
            position: relative;
        }

        .square {
            width: 300px; /* Adjust the width and height as needed */
            height: 300px;
            background-color: red;
        }

        /* Position the alert message above the square */
        .alert {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            background-color: white;
            padding: 10px;
            border: 1px solid black;
        }
    </style>
    <title>SVG Image with Alert</title>
</head>
<body>
    <div class="container">
        <svg class="square" xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="0 0 500 500">
            <script type="text/javascript">
                <![CDATA[
                window.addEventListener("load", function() {
                    var alertDiv = document.createElement("div");
                    alertDiv.className = "alert";
                    alertDiv.textContent = "SVG content loaded!";
                    document.querySelector(".container").appendChild(alertDiv);
                });
                ]]>
            </script>
        </svg>
    </div>
</body>
</html>
