<svg width="100" height="50" xmlns="http://www.w3.org/2000/svg">
    <rect x="10" y="10" width="80" height="30" rx="5" ry="5" fill="#007bff" />
    <text x="30" y="30" fill="white">Click Me</text>

    <!-- Add script inside the SVG -->
    <script type="application/ecmascript">
        <![CDATA[
        function showAlert() {
            alert("Button Clicked!");
        }
        ]]>
    </script>

    <!-- Define the clickable area -->
    <a href="#" onclick="showAlert()">
        <rect x="10" y="10" width="80" height="30" rx="5" ry="5" fill-opacity="0" />
    </a>
</svg>
