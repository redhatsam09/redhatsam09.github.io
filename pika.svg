<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="0 0 500 500">
  <script type="text/javascript">
    <![CDATA[
      // Function to redirect to example.com
      function redirectToExample() {
        window.location.href = "https://www.example.com";
      }
    ]]>
  </script>

  <!-- Load an external image and trigger redirection on load -->
  <image x="0" y="0" width="500" height="500" href="http://img2.wikia.nocookie.net/__cb20140410195908/pokemon/images/4/48/025Pikachu_OS_anime.png" onload="redirectToExample()" />
</svg>
